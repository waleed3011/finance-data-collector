name: Collect Fund Prices

on:
  schedule:
    - cron: '0 18 * * 1-5'   # Every weekday at 6pm UTC (markets closed)
  workflow_dispatch:           # Allows manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # Needed to commit CSV back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector script
        run: python collect_prices.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fund_prices.csv
          git diff --staged --quiet || git commit -m "📈 Daily price update $(date +%Y-%m-%d)"
          git push
