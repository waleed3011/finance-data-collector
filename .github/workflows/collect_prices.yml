name: Collect Fund Prices

on:
  schedule:
    - cron: '0 18 * * 1-5'   # Weekdays at 6pm UTC (after EU markets close)
  workflow_dispatch:           # Manual trigger — use this for first run & backfills

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python collect_prices.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fund_prices.csv
          git diff --staged --quiet || git commit -m "📈 Price update $(date +%Y-%m-%d)"
          git push
