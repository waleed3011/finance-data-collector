name: Fetch Stock Prices

on:
  schedule:
    # Runs at 07:00 UTC every weekday (Mon–Fri)
    # Adjust to run after your markets close — e.g. Oslo Børs closes at 16:30 CET
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices_long.csv data/prices_wide.csv
          git diff --staged --quiet || git commit -m "Auto-update prices $(date +'%Y-%m-%d')"
          git push
